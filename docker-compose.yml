# chat2api — single service, one profile volume.
#
# Defaults: the auth-free provider (googleaimode), run headful under Xvfb with the
# live browser exposed over noVNC (:6080) so you can watch/debug — and log in
# immediately if you switch to a login-gated provider (expressai/perplexity). Any
# login session persists to the profile volume, surviving restarts.
#
# Log in to a gated provider (after setting CHAT2API_PROVIDER below):
#   1. docker compose up -d chat2api
#   2. watch for `"authenticated": false` at http://<host>:9000/health
#   3. open http://<host>:6080/vnc.html, click Connect, log in in the browser
#      (open a new tab there if the server is live and serving requests)
#   4. /health flips to `"authenticated": true` — done; no restart needed
#
# Leaner auth-free setup: set CHAT2API_HEADLESS=true and drop CHAT2API_VNC and the
# 6080 port (googleaimode needs no display).
#
# Security: noVNC has no password — reach :6080 only over a private network / SSH
# tunnel, never publish it to the internet.

services:
  chat2api:
    image: ghcr.io/madhavtummala/chat2api:latest
    container_name: chat2api
    restart: unless-stopped
    environment:
      CHAT2API_PROVIDER: googleaimode
      CHAT2API_HEADLESS: "false"     # headful under Xvfb (required for noVNC)
      CHAT2API_VNC: "true"           # live browser on :6080 for login/debug
    ports:
      - "9000:9000"
      - "6080:6080"
    volumes:
      - browser_profile:/app/.browser_profile

volumes:
  browser_profile:
