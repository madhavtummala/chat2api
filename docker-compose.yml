# chat2api — single service, one profile volume.
#
# Auth-free provider (default googleaimode) — just run it:
#   docker compose up -d chat2api                 # API on :9000
#
# Provider that needs a login (expressai) or a Cloudflare-gated one (perplexity):
# run headful with the live browser exposed, log in once via noVNC, done. The
# session persists to the profile volume, so it survives restarts.
#   1. set CHAT2API_HEADLESS=false and CHAT2API_VNC=true below (and publish 6080)
#   2. docker compose up -d chat2api
#   3. watch for `"authenticated": false` at http://<host>:9000/health
#   4. open http://<host>:6080/vnc.html, click Connect, log in in the browser
#      (open a new tab there if the server is live and serving requests)
#   5. /health flips to `"authenticated": true` — you're done; no restart needed

services:
  chat2api:
    build: .
    image: chat2api
    command: ["server"]
    env_file: .env
    environment:
      CHAT2API_HEADLESS: "true"
      # For login-gated / Cloudflare providers, run headful + expose the browser:
      #   CHAT2API_HEADLESS: "false"   # headful under Xvfb
      #   CHAT2API_VNC: "true"         # live browser on :6080 (log in / debug)
    ports:
      - "9000:9000"
      # - "6080:6080"                  # noVNC — only with CHAT2API_VNC=true
    volumes:
      - browser_profile:/app/.browser_profile
    restart: unless-stopped

volumes:
  browser_profile:
